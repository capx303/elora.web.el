<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Smart TV UI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#050505;
    color:white;
    overflow:hidden;
}

/* LAYOUT */
.container{
    display:flex;
    height:100vh;
}

/* SIDEBAR */
.sidebar{
    width:75px;
    background:rgba(255,255,255,0.03);
    border-right:1px solid rgba(255,255,255,0.05);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding-top:20px;
    gap:18px;
}

.side-btn{
    width:48px;
    height:48px;
    border-radius:14px;
    background:rgba(255,255,255,0.05);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    transition:.2s;
    cursor:pointer;
}

.side-btn:hover{
    background:rgba(255,255,255,0.15);
}

/* CONTENT */
.content{
    flex:1;
    padding:25px;
}

/* HERO */
.hero{
    height:330px;
    border-radius:24px;
    background:linear-gradient(130deg,#ff4d4d,#ff2c8c,#344dff);
    padding:35px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    position:relative;
    overflow:hidden;
}

.hero::after{
    content:'';
    position:absolute;
    right:-120px;
    top:-40px;
    width:420px;
    height:420px;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
}

.hero h1{
    font-size:72px;
    font-weight:900;
    line-height:0.95;
    z-index:2;
}

.hero p{
    font-size:22px;
    margin-top:10px;
    opacity:0.9;
    z-index:2;
}

/* CATEGORY */
.categories{
    display:flex;
    gap:14px;
    margin-top:18px;
}

.cat{
    padding:14px 30px;
    border-radius:14px;
    font-weight:700;
    background:#2d8cff;
    cursor:pointer;
}

.cat:nth-child(2){background:#a04cff;}
.cat:nth-child(3){background:#4fcb63;}
.cat:nth-child(4){background:#d19b16;}
.cat:nth-child(5){background:#db4d4d;}

/* APPS */
.row-title{
    margin-top:28px;
    margin-bottom:14px;
    font-size:26px;
    font-weight:700;
}

.apps{
    display:flex;
    gap:14px;
    margin-bottom:20px;
}

.app{
    width:80px;
    height:80px;
    border-radius:18px;
    background:#121212;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    transition:.2s;
}

.app:hover{
    transform:scale(1.08);
    background:#222;
}

/* CONTENT CARDS */
.cards{
    display:flex;
    gap:18px;
}

.card{
    width:320px;
    height:170px;
    border-radius:18px;
    overflow:hidden;
    background:linear-gradient(135deg,#202020,#333);
    padding:18px;
    display:flex;
    align-items:end;
    font-size:26px;
    font-weight:800;
    transition:.2s;
}

.card:hover{
    transform:scale(1.03);
}

.card:nth-child(1){background:linear-gradient(135deg,#0d2b52,#2976ff);}
.card:nth-child(2){background:linear-gradient(135deg,#52200d,#ff8f29);}
.card:nth-child(3){background:linear-gradient(135deg,#17451a,#38d94f);}
.card:nth-child(4){background:linear-gradient(135deg,#4b1035,#ff4db5);}
.card:nth-child(5){background:linear-gradient(135deg,#2f2f2f,#777);}

/* RESPONSIVE TV */
@media (min-width:1600px){

.sidebar{
    width:95px;
}

.side-btn{
    width:58px;
    height:58px;
    font-size:28px;
}

.hero{
    height:400px;
}

.hero h1{
    font-size:95px;
}

.hero p{
    font-size:28px;
}

.app{
    width:95px;
    height:95px;
    font-size:38px;
}

.card{
    width:380px;
    height:210px;
    font-size:34px;
}
}
</style>
</head>

<body>

<div class="container">

<div class="sidebar">
    <div class="side-btn">🏠</div>
    <div class="side-btn">🔍</div>
    <div class="side-btn">🎮</div>
    <div class="side-btn">🎵</div>
    <div class="side-btn">⚙️</div>
</div>

<div class="content">

<div class="hero">
    <h1>MyView<br>Smart Hub</h1>
    <p>Dashboard moderna per FiveM</p>
</div>

<div class="categories">
    <div class="cat">Home</div>
    <div class="cat">Games</div>
    <div class="cat">Radio</div>
    <div class="cat">Browser</div>
    <div class="cat">Live</div>
</div>

<div class="row-title">Apps</div>

<div class="apps">
    <div class="app">▶️</div>
    <div class="app">🎵</div>
    <div class="app">🌐</div>
    <div class="app">📺</div>
    <div class="app">🚓</div>
    <div class="app">📷</div>
    <div class="app">💬</div>
    <div class="app">⚙️</div>
</div>

<div class="row-title">In evidenza</div>

<div class="cards">
    <div class="card">TV NEWS</div>
    <div class="card">CITY LIVE</div>
    <div class="card">RADIO RP</div>
    <div class="card">POLICE HUB</div>
    <div class="card">SETTINGS</div>
</div>

</div>
</div>

</body>
</html>
